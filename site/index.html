<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Scouting Report</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="lock" class="lock">
  <form id="lock-form" class="lock-card">
    <h1>Scouting Report</h1>
    <p>Enter your team passphrase</p>
    <div class="pass-row">
      <input id="pass" type="password" autocomplete="current-password" autofocus>
      <button id="pass-toggle" type="button" aria-label="Show passphrase">👁</button>
    </div>
    <button type="submit">Unlock</button>
    <p id="lock-error" class="error" hidden>Incorrect passphrase</p>
    <p id="lock-loading" hidden>Decrypting…</p>
  </form>
</div>
<div id="app" hidden>
  <header>
    <h1>Scouting Report</h1>
    <span id="meta"></span>
    <button id="nickname-btn" type="button"></button>
    <button id="lock-btn" type="button">Lock</button>
  </header>
  <nav id="tabs">
    <button data-view="roster" class="active">Roster</button>
    <button data-view="candidates">Candidates</button>
    <button data-view="history">History</button>
    <button data-view="dashboard">Dashboard</button>
  </nav>
  <main id="view"></main>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
